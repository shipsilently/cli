name: Publish to npm

# Publishes @shipsilently/cli to npm.
#
# Triggers: a `v*` tag (pushed by the upstream mirror), a published GitHub
# Release, or manual dispatch (defaults to a dry run).
#
# Auth: npm Trusted Publishing (OIDC) — no token/secret. Configure a trusted
# publisher for @shipsilently/cli on npmjs.com pointing at this repo + this
# workflow file (release.yml). See https://docs.npmjs.com/trusted-publishers

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish in --dry-run mode (no upload)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # npm provenance

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; node 22 ships npm 10.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run type-check

      - name: Build
        run: bun run build

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version $PKG_VERSION matches tag."

      # No NODE_AUTH_TOKEN — auth is via OIDC trusted publishing.
      - name: Publish to npm
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run — packing without publishing:"
            npm publish --provenance --access public --dry-run
          else
            npm publish --provenance --access public
          fi
